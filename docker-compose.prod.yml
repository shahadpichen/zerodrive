version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zerodrive-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-zerodrive}
      POSTGRES_USER: ${DB_USER:-zerodrive_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zerodrive_app} -d ${DB_NAME:-zerodrive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zerodrive-internal

  minio:
    image: minio/minio:latest
    container_name: zerodrive-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: https://files.zerodrive.xyz
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - zerodrive-internal

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb myminio/zerodrive-files --ignore-existing;
      /usr/bin/mc anonymous set public myminio/zerodrive-files;
      "
    networks:
      - zerodrive-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zerodrive-backend
    env_file:
      - ./backend/.env.production
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zerodrive-internal

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: zerodrive-frontend
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    networks:
      - zerodrive-internal

volumes:
  postgres_data:
  minio_data:

networks:
  zerodrive-internal:
    driver: bridge
