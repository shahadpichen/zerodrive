name: Dependency Check

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Audit backend dependencies
        working-directory: ./backend
        run: |
          echo "## Backend Security Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate || true
          npm audit --json > audit-results.json || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Audit frontend dependencies
        working-directory: ./app
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Security Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate || true
          npm audit --json > audit-results.json || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Check for high/critical vulnerabilities in backend
        working-directory: ./backend
        id: backend-audit
        run: |
          if npm audit --audit-level=high; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check for high/critical vulnerabilities in frontend
        working-directory: ./app
        id: frontend-audit
        run: |
          if npm audit --audit-level=high; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: steps.backend-audit.outputs.status == 'fail' || steps.frontend-audit.outputs.status == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Security Vulnerabilities Detected';
            const body = `## Security Audit Alert

            High or critical security vulnerabilities have been detected in the project dependencies.

            **Backend Status:** ${{ steps.backend-audit.outputs.status }}
            **Frontend Status:** ${{ steps.frontend-audit.outputs.status }}

            ### Action Required
            Please review the vulnerabilities and update the affected packages.

            Run the following commands to see details:
            \`\`\`bash
            # Backend
            cd backend && npm audit

            # Frontend
            cd app && npm audit
            \`\`\`

            ### Auto-fix attempts
            Try running:
            \`\`\`bash
            npm audit fix
            \`\`\`

            For breaking changes, you may need:
            \`\`\`bash
            npm audit fix --force
            \`\`\`

            ---
            *This issue was automatically created by the Dependency Check workflow.*
            *Date: ${{ github.event.repository.updated_at }}*`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies', 'automated']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Vulnerabilities still present as of ${new Date().toISOString()}`
              });
            }

  outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Check backend outdated packages
        working-directory: ./backend
        run: |
          echo "## Backend Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm outdated || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check frontend outdated packages
        working-directory: ./app
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm outdated || true
          echo '```' >> $GITHUB_STEP_SUMMARY
